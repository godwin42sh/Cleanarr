# Postgres credentials — the single source of truth, shared by both the db
# container and the backend (which derives DATABASE_URL from them). Override
# via the environment or a .env file next to this compose file.
x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-cleanarr}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cleanarr}
  POSTGRES_DB: ${POSTGRES_DB:-cleanarr}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment: *postgres-env
    volumes:
      - cleanarr-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cleanarr} -d ${POSTGRES_DB:-cleanarr}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: cleanarr-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Same Postgres credentials as the db service; the backend entrypoint
      # builds DATABASE_URL from these (host = the db service below).
      <<: *postgres-env
      POSTGRES_HOST: db
      QB_URL: ${QB_URL}
      QB_USERNAME: ${QB_USERNAME}
      QB_PASSWORD: ${QB_PASSWORD}
      SCAN_DIRS: ${SCAN_DIRS}
      SCAN_DAYS: ${SCAN_DAYS:-7}
      MEDIA_EXTENSIONS: ${MEDIA_EXTENSIONS:-}
      CLEANUP_CRON: ${CLEANUP_CRON:-0 4 * * *}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${FRONTEND_PORT:-8080}}
      PORT: 3000
    volumes:
      # Mount the media library read/write so the scanner can inspect and,
      # when cleaning orphans, delete files. Adjust to match your host paths.
      - ${MEDIA_ROOT:-/mnt/Nas/Media}:${MEDIA_ROOT:-/mnt/Nas/Media}
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    image: cleanarr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-8080}:80'

volumes:
  cleanarr-db:
